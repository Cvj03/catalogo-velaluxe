    .gallery-item img {

    /* EL DISEÑO DE LA FLECHA (Flotando al centro del costado derecho) */

    }

    
    const videosUI = document.querySelectorAll('video');
    if (data.videos) {
        data.videos.forEach((url, i) => {
    if (videosUI[i]) {
        if (url.includes('youtube.com') || url.includes('youtu.be') || url.includes('youtube-nocookie.com')) {
            // Si el link es de YouTube, fabricamos un iframe dinámico
            let iframe = document.createElement('iframe');
            iframe.id = videosUI[i].id;
            iframe.src = url;
            iframe.className = videosUI[i].className; // Mantiene las clases de CSS (.media-item, etc.)
            iframe.style.cssText = videosUI[i].style.cssText;
            iframe.style.width = "100%";
            iframe.style.height = "100%";
            iframe.setAttribute('frameborder', '0');
            iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
            iframe.setAttribute('allowfullscreen', 'true');
            
            // Intercambiamos el <video> muerto por el <iframe> vivo de YouTube
            videosUI[i].parentNode.replaceChild(iframe, videosUI[i]);

    function toggleVideo(num) {
    var img = document.getElementById('img' + num);
    var elemento = document.getElementById('main-video' + num);
    var arrow = elemento.parentElement.querySelector('.video-arrow');

    var esImagen = elemento.src.includes('ibb.co') || elemento.src.includes('cloudinary') || elemento.src.includes('.jpg');

    if (esImagen && elemento.tagName === 'VIDEO') {
        var nuevaImg = document.createElement('img');
        nuevaImg.id = elemento.id;
        nuevaImg.src = elemento.src;
        nuevaImg.style.display = 'none';
        nuevaImg.style.width = '100%';
        elemento.parentNode.replaceChild(nuevaImg, elemento);
        elemento = nuevaImg;
    }

    if (img.style.display !== 'none') {
        img.style.display = 'none';
        elemento.style.display = 'block';
        if (arrow) arrow.style.display = 'none';

        // RED DE SEGURIDAD: Solo hacemos .play() si la función existe realmente
        if (elemento.play && typeof elemento.play === 'function') {
            elemento.play();
        }
    } else {
        img.style.display = 'block';
        elemento.style.display = 'none';
        if (arrow) arrow.style.display = 'block';

        // RED DE SEGURIDAD: Solo hacemos .pause() si la función existe realmente
        if (elemento.pause && typeof elemento.pause === 'function') {
            elemento.pause();
            elemento.currentTime = 0;
        }
    }
